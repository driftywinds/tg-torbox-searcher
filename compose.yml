#version: "3.9"

services:
  searcher:
#    build:
#      context: .
#      dockerfile: Dockerfile
    image: ghcr.io/driftywinds/tg-torbox-searcher
    container_name: torbox-searcher
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Explicitly set DATA_DIR so that even if .env has a different value,
      # the bot writes to the mounted volume and user data survives restarts.
      - DATA_DIR=/data
    volumes:
      # Persist the authorised-users list so it survives container restarts.
      - ./data:/data

